name: Build NixOS ISO

on:
  push:
    branches: [ main ]
    paths:
      - 'nixos/**'
      - 'scripts/**'
      - '.github/workflows/build-iso.yml'
  workflow_dispatch: { }

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Build ISO
        working-directory: ./nixos
        run: |
          nix build .#nixosConfigurations.mesh-iso.config.system.build.isoImage \
            --extra-experimental-features "nix-command flakes" \
            --out-link result
          # Find the actual ISO file
          ISO_PATH=$(find -L result -name "*.iso" | head -1)
          echo "ISO found at: $ISO_PATH"
          ls -lh "$ISO_PATH"
          cp "$ISO_PATH" ./mesh-iso-x86_64.iso

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: network-mesh-iso-x86_64
          path: nixos/mesh-iso-x86_64.iso
          retention-days: 30

      - name: Create Release with ISO
        uses: softprops/action-gh-release@v2
        with:
          tag_name: iso-${{ github.sha }}
          name: "Network Music Mesh ISO (${{ github.run_number }})"
          files: nixos/mesh-iso-x86_64.iso
          body: |
            ## 🎵 Network Music Mesh - NixOS ISO (x86_64)

            Boot from USB on any Intel/AMD 64-bit machine.

            ### Features
            - Self-organizing mesh WiFi network
            - Auto master election (RAM + CPU based)
            - Icecast music streaming
            - Web dashboard (port 8080) + TUI
            - 25 unique songs per node

            ### Usage
            ```bash
            dd if=mesh-iso-x86_64.iso of=/dev/sdX bs=4M status=progress
            ```
